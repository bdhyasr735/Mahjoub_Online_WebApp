<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة شركاء النجاح | دخول الموردين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --royal-purple: #632C8F; --gold-accent: #D4AF37; }
        body { 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            font-family: 'Cairo', sans-serif; margin: 0;
        }
        .login-container {
            width: 100%; max-width: 450px; padding: 40px; background: rgba(255, 255, 255, 0.95);
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center; position: relative; border: 1px solid rgba(99, 44, 143, 0.1);
        }
        .btn-royal {
            background: var(--royal-purple); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 15px; font-weight: 700; transition: all 0.3s;
        }
        .btn-royal:hover { background: #4a1f6d; color: var(--gold-accent); transform: translateY(-2px); }
        .form-control { height: 55px; border-radius: 15px; border: 2px solid #eee; padding-right: 45px; }
        .input-group-custom { position: relative; margin-bottom: 20px; }
        .input-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
    </style>
</head>
<body>
    <div class="login-container">
        <h3 class="mb-4">بوابة <span style="color: var(--royal-purple);">شركاء النجاح</span></h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('supplier_panel.login') }}" method="POST">
            <div class="input-group-custom">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="form-control" placeholder="اسم المورد العربي" required>
            </div>
            <div class="input-group-custom">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn-royal">ولوج الآمن للمنصة</button>
        </form>
        <div class="mt-4 small text-muted">جميع الحقوق محفوظة © 2026 محجوب أونلاين</div>
    </div>
</body>
</html>
