<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الموردين | محجوب أونلاين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --p-purple: #632C8F; --m-gold: #D4AF37; }
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: #1a1a1a; min-height: 100vh; border-left: 1px solid var(--m-gold); }
        .nav-link { color: #ccc; transition: 0.3s; border-radius: 8px; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: var(--p-purple); color: white; }
        .stat-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <h4 class="text-center fw-bold mb-4" style="color: var(--m-gold);">شريك النجاح</h4>
                <div class="nav flex-column">
                    <a class="nav-link active" href="{{ url_for('supplier_panel.dashboard') }}"><i class="fas fa-home me-2"></i> الإحصائيات</a>
                    <a class="nav-link" href="{{ url_for('supplier_panel.add_product') }}"><i class="fas fa-plus-circle me-2"></i> إضافة منتج</a>
                    <a class="nav-link" href="#"><i class="fas fa-boxes me-2"></i> منتجاتي</a>
                    <hr>
                    <a class="nav-link text-danger" href="{{ url_for('supplier_panel.logout') }}"><i class="fas fa-sign-out-alt me-2"></i> تسجيل الخروج</a>
                </div>
            </nav>
            <main class="col-md-10 ms-sm-auto p-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
