<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محجوب أونلاين | دخول السيادة</title>
    <style>
        body {
            background-color: #0a0a0a; color: #d4af37;
            font-family: Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .login-card {
            background: #141414; padding: 40px;
            border: 1px solid #d4af37; border-radius: 15px;
            text-align: center; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        input {
            width: 100%; padding: 10px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #333; color: white;
        }
        button {
            background: #d4af37; color: black; border: none;
            padding: 10px 25px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size: 40px; margin-bottom: 10px;">👁️</div>
        <h2>محجوب أونلاين</h2>
        <p>سوقك الذكي | Smart Market</p>
        <form>
            <input type="text" placeholder="اسم المستخدم">
            <input type="password" placeholder="كلمة المرور">
            <button type="submit">دخول</button>
        </form>
    </div>
</body>
</html>
