<div class="offcanvas offcanvas-start border-0 shadow-lg" tabindex="-1" id="supplierInspector" 
     style="width: 450px; background: #f8fafc; direction: rtl;">
    
    <div class="offcanvas-header text-white" style="background: linear-gradient(135deg, #632C8F 0%, #4a1d6d 100%); border-bottom: 4px solid #C5A021;">
        <div class="d-flex align-items-center">
            <i class="fas fa-user-shield fs-4 me-2 text-gold"></i>
            <h5 class="offcanvas-title fw-bold" id="inspectorTitle">فحص بيانات الترسانة</h5>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body p-0">
        <div id="inspectorContent" class="p-4">
            <div class="text-center py-5">
                <div class="spinner-border text-royal" role="status"></div>
                <p class="mt-3 text-muted">جاري استدعاء السجل الرقمي...</p>
            </div>
        </div>

        <div class="p-4 bg-white border-top shadow-sm mt-auto">
            <div class="d-grid gap-3">
                <a id="walletLink" href="#" class="btn btn-gold-action py-3 fw-bold rounded-4 shadow-sm">
                    <i class="fas fa-wallet me-2"></i> الانتقال للمحفظة المالية
                </a>
                
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-danger flex-grow-1 py-2 fw-bold" onclick="updateStatus('suspended')">
                        <i class="fas fa-ban me-1"></i> إيقاف
                    </button>
                    <button class="btn btn-outline-success flex-grow-1 py-2 fw-bold" onclick="updateStatus('active')">
                        <i class="fas fa-check me-1"></i> تفعيل
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
