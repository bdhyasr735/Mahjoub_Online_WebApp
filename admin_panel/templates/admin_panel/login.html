<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | برج الرقابة المركزية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mahjoub-purple: #632C8F;
            --mahjoub-gold: #D4AF37;
            --bg-dark: #050505;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0f0c29 0%, #050505 100%);
            color: white;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--mahjoub-purple), transparent, var(--mahjoub-gold));
            z-index: -1;
            border-radius: 22px;
            opacity: 0.3;
        }

        .logo-section h2 {
            font-weight: 900;
            font-size: 1.5rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .logo-section p {
            color: var(--mahjoub-gold);
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
            position: relative;
        }

        .form-group i {
            position: absolute;
            right: 15px;
            top: 42px;
            color: var(--mahjoub-gold);
            font-size: 0.9rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .form-control {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-family: 'Cairo';
            box-sizing: border-box;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--mahjoub-gold);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--mahjoub-purple), #4a1d6d);
            border: 1px solid var(--mahjoub-gold);
            border-radius: 10px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(99, 44, 143, 0.4);
            filter: brightness(1.2);
        }

        .flash-messages {
            margin-bottom: 20px;
            list-style: none;
            padding: 0;
        }

        .flash-msg {
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #4b5563;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-section">
            <h2>MAHJOUB | <span style="color: var(--mahjoub-gold);">ONLINE</span></h2>
            <p>برج الرقابة المركزية</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-messages">
              {% for category, message in messages %}
                <li class="flash-msg">{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_panel.login') }}" method="POST">
            <div class="form-group">
                <label>اسم القائد</label>
                <i class="fas fa-user-shield"></i>
                <input type="text" name="username" class="form-control" placeholder="علي محجوب" required>
            </div>

            <div class="form-group">
                <label>كلمة المرور السيادية</label>
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> ولوج آمن
            </button>
        </form>

        <div class="footer-text">
            &copy; 2026 جميع الحقوق محفوظة لـ محجوب أونلاين
        </div>
    </div>

</body>
</html>
