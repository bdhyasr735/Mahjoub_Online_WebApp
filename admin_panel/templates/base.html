<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين - الإدارة{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p-color: #4B0082; --g-color: #D4AF37; --bg-dark: #1a1a2e; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* القائمة الجانبية */
        .sidebar {
            width: 260px; height: 100vh; background: var(--p-color);
            position: fixed; top: 0; right: 0; color: white; transition: 0.3s;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h4 { color: var(--g-color); font-weight: bold; margin: 0; }
        
        .nav-link {
            color: rgba(255,255,255,0.8); padding: 15px 25px;
            display: flex; align-items: center; text-decoration: none; transition: 0.3s;
        }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: var(--g-color); }
        .nav-link i { margin-left: 15px; width: 20px; }

        /* المحتوى الرئيسي */
        .main-content { margin-right: 260px; padding: 30px; transition: 0.3s; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .top-bar { background: white; padding: 15px 30px; margin-bottom: 30px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h4>سوقك الذكي</h4>
            <small>نظام الإدارة المتطور</small>
        </div>
        <nav class="mt-4">
            <a href="/admin/dashboard" class="nav-link"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
            <a href="/admin/wallets" class="nav-link"><i class="fas fa-wallet"></i> إدارة المحافظ</a>
            <a href="/admin/product-review" class="nav-link"><i class="fas fa-check-circle"></i> مراجعة المنتجات</a>
            <a href="/admin/order-routing" class="nav-link"><i class="fas fa-truck"></i> توجيه الطلبات</a>
            <a href="/" class="nav-link mt-5 text-danger"><i class="fas fa-sign-out-alt"></i> خروج</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-bar card shadow-sm">
            <div class="user-info">
                <strong>مرحباً، علي محجوب</strong>
                <span class="badge bg-success ms-2">متصل</span>
            </div>
            <div class="date-info text-muted">
                <i class="far fa-calendar-alt"></i> 2026-04-22
            </div>
        </div>

        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
