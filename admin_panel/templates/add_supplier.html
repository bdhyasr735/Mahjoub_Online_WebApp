{% extends "base.html" %}

{% block title %}التعميد السيادي للموردين | محجوب أونلاين{% endblock %}

{% block content %}
<!-- المكتبات اللازمة للتنبيهات والأيقونات -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    :root {
        --gov-purple: #632C8F;
        --gov-gold: #C5A021;
        --text-main: #1e293b;
        --accent-green: #10b981;
    }

    .form-container {
        max-width: 1000px;
        margin: 20px auto;
        direction: rtl;
        background: #fff;
        border-radius: 15px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    .form-header {
        background: var(--gov-purple);
        color: white;
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .section-banner {
        background: #f8fafc;
        color: var(--gov-purple);
        padding: 10px 25px;
        font-weight: bold;
        border-right: 4px solid var(--gov-gold);
        margin: 20px 0 15px 0;
        font-size: 1.1rem;
    }

    .grid-layout {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 0 25px;
    }

    .input-box { display: flex; flex-direction: column; gap: 8px; }
    .input-box label { font-size: 0.85rem; font-weight: 700; color: #475569; }

    .form-control-gov {
        padding: 12px;
        border-radius: 8px;
        border: 1.5px solid #cbd5e1;
        background: #fff;
        font-size: 0.95rem;
        transition: 0.3s;
    }

    .form-control-gov:focus {
        border-color: var(--gov-purple);
        outline: none;
        box-shadow: 0 0 0 3px rgba(99, 44, 143, 0.1);
    }

    .form-control-readonly {
        background-color: #f1f5f9;
        cursor: not-allowed;
        border-color: var(--gov-gold);
        font-weight: bold;
        color: var(--gov-purple);
    }

    .btn-gov {
        background: var(--gov-purple);
        color: white;
        border: 2px solid var(--gov-gold);
        padding: 15px 50px;
        border-radius: 10px;
        font-weight: 900;
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-copy-mini {
        background: var(--gov-gold);
        border: none;
        color: white;
        cursor: pointer;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.8rem;
        margin-right: 8px;
    }
    
    .welcome-msg {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        padding: 15px;
        border-radius: 8px;
        color: #166534;
        margin-bottom: 20px;
        text-align: center;
    }
</style>

<div class="form-container">
    <div class="form-header">
        <h2 style="margin:0;">🛡️ تعميد مورد جديد</h2>
        <div style="text-align:left;">
            <small>المعرف السيادي والمحفظة</small><br>
            <strong id="sovereign_id_display" style="font-size:1.4rem; color:var(--gov-gold);">{{ next_id }}</strong>
        </div>
    </div>

    <form id="sovereignForm" action="{{ url_for('admin.add_supplier') }}" method="POST" enctype="multipart/form-data">
        
        <div class="section-banner">👤 بيانات الحساب والنشاط</div>
        <div class="grid-layout">
            <div class="input-box">
                <label>اسم المستخدم</label>
                <input type="text" name="username" id="form_username" class="form-control-gov" placeholder="مثال: ali_2026" required>
            </div>
            <div class="input-box">
                <label>كلمة المرور المؤقتة</label>
                <input type="text" name="password" id="form_pass" value="123" class="form-control-gov" required>
            </div>
            <div class="input-box">
                <label>نوع النشاط</label>
                <select name="activity_type" class="form-control-gov" required>
                    <option value="مواد غذائية">مواد غذائية</option>
                    <option value="إلكترونيات">إلكترونيات وتقنية</option>
                    <option value="ملابس">ملابس ومنسوجات</option>
                    <option value="manual">أخرى...</option>
                </select>
            </div>
        </div>

        <div class="section-banner">📍 بيانات الهوية والمنشأة</div>
        <div class="grid-layout">
            <div class="input-box">
                <label>اسم المالك الكامل</label>
                <input type="text" name="owner_name" class="form-control-gov" required>
            </div>
            <div class="input-box">
                <label>رقم الهوية / السجل</label>
                <input type="text" name="id_card_number" class="form-control-gov" required>
            </div>
            <div class="input-box">
                <label>صورة الوثيقة (أرشفة سيادية)</label>
                <input type="file" name="id_image" class="form-control-gov" accept="image/*" required>
            </div>
            <div class="input-box">
                <label>الاسم التجاري</label>
                <input type="text" name="trade_name" class="form-control-gov" required>
            </div>
            <div class="input-box">
                <label>المحافظة</label>
                <select name="province" id="prov_select" class="form-control-gov" onchange="loadDistricts(this.value)" required>
                    <option value="">اختر المحافظة...</option>
                </select>
            </div>
            <div class="input-box">
                <label>المديرية</label>
                <select name="district" id="dist_select" class="form-control-gov" required>
                    <option value="">حدد المحافظة أولاً</option>
                </select>
            </div>
        </div>

        <div class="section-banner">🏦 الربط المالي (المحفظة الذكية)</div>
        <div class="grid-layout">
            <div class="input-box">
                <label>رقم الأيدي والمحفظة (تلقائي)</label>
                <input type="text" name="e_wallet" id="e_wallet_input" class="form-control-gov form-control-readonly" readonly>
            </div>
            <div class="input-box">
                <label>اسم البنك / شركة الصرافة</label>
                <input type="text" name="bank_name" class="form-control-gov" placeholder="مثال: بنك الكريمي" required>
            </div>
            <div class="input-box">
                <label>رقم الحساب المالي</label>
                <input type="text" name="bank_acc" class="form-control-gov" required>
            </div>
        </div>

        <div style="text-align: center; padding: 40px;">
            <button type="submit" id="submitBtn" class="btn-gov">🛡️ إتمام التعميد والأرشفة</button>
        </div>
    </form>
</div>

<script>
    const geoData = {
        "عدن": ["المنصورة", "كريتر", "الشيخ عثمان", "البريقة"],
        "الحديدة": ["الخوخة", "الحوك", "الميناء", "زبيد"],
        "تعز": ["المخاء", "القاهرة", "المظفر"],
        "حضرموت": ["المكلا", "سيئون"]
    };

    function loadDistricts(prov) {
        const dSelect = document.getElementById('dist_select');
        dSelect.innerHTML = '<option value="">اختر المديرية...</option>';
        if(geoData[prov]) geoData[prov].forEach(d => dSelect.add(new Option(d, d)));
    }

    function copyToClipboard(text, label) {
        navigator.clipboard.writeText(text).then(() => {
            Swal.fire({ title: 'تم النسخ!', text: `نسخت ${label}: ${text}`, icon: 'success', timer: 800, showConfirmButton: false, toast: true, position: 'top-end' });
        });
    }

    document.getElementById('sovereignForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const sID = document.getElementById('sovereign_id_display').innerText;
        const uName = document.getElementById('form_username').value;
        const pass = document.getElementById('form_pass').value;

        btn.innerHTML = "⏳ جاري الأرشفة السيادية...";
        btn.disabled = true;

        try {
            const response = await fetch(this.action, { method: 'POST', body: new FormData(this) });
            if (response.ok) {
                Swal.fire({
                    title: '✅ تم التعميد بنجاح يا عظيم!',
                    html: `
                        <div class="welcome-msg">
                            أهلاً بك في منصة محجوب أونلاين، نحن نؤمن بأن النجاح يُبنى بالثقة.
                        </div>
                        <div style="text-align: right; direction: rtl; line-height: 2;">
                            <b>🆔 الرقم السيادي (المحفظة):</b> <code id="copy_sid">${sID}</code> 
                            <button onclick="copyToClipboard('${sID}', 'الرقم السيادي')" class="btn-copy-mini">نسخ</button><br>
                            
                            <b>👤 اسم المستخدم:</b> <code id="copy_user">${uName}</code> 
                            <button onclick="copyToClipboard('${uName}', 'اسم المستخدم')" class="btn-copy-mini">نسخ</button><br>
                            
                            <b>🔑 كلمة المرور:</b> <code>${pass}</code> 
                            <button onclick="copyToClipboard('${pass}', 'كلمة المرور')" class="btn-copy-mini">نسخ</button><br>
                            <hr>
                            <p style="color:red; font-size:0.8rem;">⚠️ يرجى الطلب من المورد تغيير كلمة المرور فور الدخول.</p>
                        </div>
                    `,
                    icon: 'success',
                    confirmButtonText: 'حسناً، الانتقال للمراقبة',
                    confirmButtonColor: '#632C8F'
                }).then(() => window.location.href = "{{ url_for('admin.admin_dashboard') }}");
            }
        } catch (err) {
            Swal.fire('خطأ!', 'فشل الاتصال بالترسانة الرقمية.', 'error');
            btn.disabled = false;
        }
    };

    window.onload = () => {
        const pSelect = document.getElementById('prov_select');
        Object.keys(geoData).forEach(p => pSelect.add(new Option(p, p)));
        // ربط المحفظة بالايدي تلقائياً
        document.getElementById('e_wallet_input').value = document.getElementById('sovereign_id_display').innerText;
    }
</script>
{% endblock %}
