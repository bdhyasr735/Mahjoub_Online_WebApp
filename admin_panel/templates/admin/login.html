<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | برج الرقابة المركزية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mahjoub-purple: #632C8F;
            --mahjoub-gold: #D4AF37;
            --bg-dark: #050505;
            --glass-bg: rgba(10, 10, 10, 0.85);
            --danger: #ff4d4d;
            --warning: #ffcc00;
            --success: #00ffcc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            color: white;
            overflow: hidden;
        }

        /* الطبقة العلوية للتأثير البصري */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            animation: moveBg 60s linear infinite;
            z-index: -1;
        }

        @keyframes moveBg {
            from { transform: translate(0,0); }
            to { transform: translate(-50%, -50%); }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: var(--glass-bg);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 25px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(99, 44, 143, 0.1);
            text-align: center;
            position: relative;
            transition: 0.5s;
        }

        .logo-section h2 {
            font-weight: 900;
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section p {
            color: var(--mahjoub-gold);
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .flash-msg {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 20px;
            border: 1px solid transparent;
            animation: shake 0.5s ease-in-out;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flash-danger { background: rgba(255, 77, 77, 0.1); color: var(--danger); border-color: rgba(255, 77, 77, 0.2); }
        .flash-success { background: rgba(0, 255, 204, 0.1); color: var(--success); border-color: rgba(0, 255, 204, 0.2); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: #cbd5e1; }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--mahjoub-gold);
        }

        .form-control {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-family: 'Cairo';
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--mahjoub-gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--mahjoub-purple), #4a1d6d);
            border: 1px solid var(--mahjoub-gold);
            border-radius: 10px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 44, 143, 0.4); }

        .footer-text { margin-top: 30px; font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-section">
            <h2>MAHJOUB | <span style="color: var(--mahjoub-gold);">ONLINE</span></h2>
            <p>نظام الولوج السيادي</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-msg flash-{{ 'danger' if category in ['error', 'danger'] else category }}">
                <i class="fas fa-shield-alt"></i>
                {{ message }}
              </div>
            {% endfor %}
          {%
