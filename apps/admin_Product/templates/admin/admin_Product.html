{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <button onclick="history.back()" class="btn btn-outline-dark"><i class="fas fa-arrow-right"></i> رجوع</button>
        <button type="button" id="sync-btn" class="btn btn-primary" onclick="startSync()">
            <i class="fas fa-sync-alt"></i> مزامنة المنتجات
        </button>
    </div>

    <div class="row row-cols-1 row-cols-md-5 g-3">
        {% for product in products %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <div class="card-body p-3">
                    <h6 class="card-title fw-bold text-truncate">{{ product.title }}</h6>
                    <p class="text-muted small">السعر: {{ product.cost_price }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    async function startSync() {
        const btn = document.getElementById('sync-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الاتصال بخدمة محجوب...';

        try {
            // 1. جلب البيانات عبر البروكسي المحلي
            const response = await fetch("{{ url_for('admin_product_bp.proxy_sync') }}", {
                method: 'POST',
                headers: { 'X-CSRFToken': "{{ csrf_token() }}" }
            });

            if (!response.ok) throw new Error("فشل الاتصال بالخادم. يرجى التحقق من حالة النظام.");

            const result = await response.json();
            
            // التأكد من وجود البيانات في المسار المتوقع من استجابة GraphQL
            const products = result.data?.findAllProducts?.items;

            if (!products || products.length === 0) {
                throw new Error("لم يتم العثور على منتجات لجلبها.");
            }

            // 2. إرسال البيانات للحفظ في القاعدة المحلية
            btn.innerHTML = '<i class="fas fa-save fa-spin"></i> جاري التحديث في قاعدة البيانات...';
            
            const saveResponse = await fetch("{{ url_for('admin_product_bp.save_sync') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': "{{ csrf_token() }}"
                },
                body: JSON.stringify({ products: products })
            });

            const saveResult = await saveResponse.json();
            
            if (saveResponse.ok && saveResult.status === 'success') {
                alert(saveResult.message);
                location.reload(); // تحديث الصفحة لرؤية البيانات الجديدة
            } else {
                throw new Error(saveResult.message || "حدث خطأ أثناء الحفظ.");
            }
        } catch (err) {
            console.error("Sync Error:", err);
            alert('خطأ في المزامنة: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sync-alt"></i> مزامنة المنتجات';
        }
    }
</script>
{% endblock %}
