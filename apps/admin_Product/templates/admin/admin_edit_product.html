<!-- 📂 apps/admin_Product/templates/admin/admin_edit_product.html -->
{% extends "admin/admin_base.html" %}

{% block content %}
<style>
    /* هوية بنفسجية ملكية تميل للسواد */
    :root {
        --deep-purple-dark: #2d1b4e;
        --border-dark: #1a0f2e;
        --royal-black: #050505;
    }

    body {
        background-color: #f8f9fa;
    }

    .header-gradient {
        background: linear-gradient(135deg, var(--deep-purple-dark), var(--royal-black));
        color: #ffffff;
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 25px;
        border-bottom: 4px solid var(--deep-purple-dark);
        box-shadow: 0 4px 15px rgba(45, 27, 78, 0.3);
    }

    .card {
        border: 1px solid rgba(45, 27, 78, 0.1);
        border-radius: 10px;
    }

    .btn-custom-purple {
        background-color: var(--deep-purple-dark);
        color: white;
        border: 2px solid var(--border-dark);
        transition: all 0.3s ease;
    }

    .btn-custom-purple:hover {
        background-color: #000000;
        border-color: var(--deep-purple-dark);
        color: #e0e0e0;
    }

    .form-control, .form-select {
        border-radius: 6px;
        border: 1px solid #ced4da;
    }

    .form-control:focus {
        border-color: var(--deep-purple-dark);
        box-shadow: 0 0 0 0.2rem rgba(45, 27, 78, 0.25);
    }
</style>

<div class="container py-4">
    <!-- الرأس الاحترافي -->
    <div class="header-gradient shadow-lg d-flex justify-content-between align-items-center">
        <div>
            <h4 class="fw-bold mb-1">{{ product.title or 'منتج غير محدد' }}</h4>
            <span class="badge bg-light text-dark">{{ product.status or 'Draft' }}</span>
        </div>
        <a href="{{ url_for('admin_product_bp.manage_products') }}" 
           class="btn btn-outline-light px-4">العودة للقائمة</a>
    </div>
    
    <form id="editProductForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="qid" value="{{ product.qid }}">

        <div class="row">
            <!-- 1. البيانات الأساسية -->
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="mb-3" style="color: var(--deep-purple-dark);">البيانات الأساسية</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3"><label>اسم المنتج</label><input type="text" class="form-control" id="title" value="{{ product.title or '' }}"></div>
                            <div class="col-md-6 mb-3"><label>الرابط (Slug)</label><input type="text" class="form-control" id="slug" value="{{ product.slug or '' }}"></div>
                            <div class="col-md-12 mb-3"><label>المورد</label>
                                <select class="form-select" id="supplier_id">
                                    <option value="">-- اختر مورد --</option>
                                    {% for s in suppliers %}
                                    <option value="{{ s.id }}" {% if mapping.selected_supplier_id == s.id %}selected{% endif %}>{{ s.trade_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. التسعير والمخزون -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="mb-3" style="color: var(--deep-purple-dark);">التسعير والمخزون</h5>
                        <div class="row">
                            <div class="col-md-4 mb-3"><label>السعر</label><input type="number" class="form-control" id="price" value="{{ product.pricing.price if product.pricing else 0 }}"></div>
                            <div class="col-md-4 mb-3"><label>الكمية</label><input type="number" class="form-control" id="quantity" value="{{ product.quantity or 0 }}"></div>
                            <div class="col-md-4 mb-3"><label>SKU</label><input type="text" class="form-control" id="sku" value="{{ product.identification.sku if product.identification else '' }}"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. الصور والملاحظات -->
            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="mb-3" style="color: var(--deep-purple-dark);">صور المنتج</h5>
                        <div class="row g-2">
                            {% for img in product.images or [] %}
                                <div class="col-6"><img src="{{ img.fileUrl }}" class="img-thumbnail w-100"></div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="mb-3" style="color: var(--deep-purple-dark);">ملاحظات إدارية (خاص)</h5>
                        <textarea class="form-control" id="internal_notes" rows="3">{{ mapping.internal_notes or '' }}</textarea>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" id="saveBtn" class="btn btn-custom-purple btn-lg w-100 mt-2 shadow-sm">
            <i class="fas fa-save me-2"></i>حفظ كافة التعديلات
        </button>
    </form>
</div>

<script>
    function saveProduct(event) {
        event.preventDefault();
        // هنا سيأتي لاحقاً منطق الـ Fetch لربط الـ Save-Sync
        alert("جاري حفظ البيانات...");
    }
</script>
{% endblock %}
