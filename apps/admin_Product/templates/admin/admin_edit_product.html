<!-- 📂 apps/admin_Product/templates/admin/admin_edit_product.html -->
{% extends "admin/admin_base.html" %}

{% block content %}
<style>
    :root { 
        --deep-purple: #1a0033; /* لون الهوية الأساسي */
        --royal-accent: #4b0082; 
        --light-bg: #f4f4f7;
    }
    .header-gradient { background: var(--deep-purple); color: white; padding: 25px; border-radius: 12px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-custom-purple { background: var(--deep-purple); color: white; border: none; transition: 0.3s; }
    .btn-custom-purple:hover { background: var(--royal-accent); color: white; }
    .img-card { border: 2px dashed #ddd; border-radius: 8px; padding: 5px; transition: 0.3s; }
    .img-card:hover { border-color: var(--royal-accent); }
</style>

<div class="container py-4">
    <div class="header-gradient shadow-lg d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">{{ product.title or 'تفاصيل المنتج' }}</h4>
            <small>المعرف الفريد (QID): {{ product.qid }}</small>
        </div>
        <a href="{{ url_for('admin_product_bp.manage_products') }}" class="btn btn-outline-light">العودة للقائمة</a>
    </div>
    
    <form id="editProductForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="qid" value="{{ product.qid }}">

        <div class="row">
            <div class="col-lg-8">
                <!-- البيانات الأساسية -->
                <div class="card mb-4 p-4">
                    <h5 class="mb-3" style="color: var(--deep-purple); font-weight: bold;">البيانات الأساسية</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>اسم المنتج</label><input type="text" class="form-control" id="title" value="{{ product.title or '' }}"></div>
                        <div class="col-md-6 mb-3"><label>الرابط (Slug)</label><input type="text" class="form-control" id="slug" value="{{ product.slug or '' }}"></div>
                        <div class="col-md-12 mb-3"><label>وصف المنتج</label><textarea class="form-control" id="description" rows="5">{{ product.description or '' }}</textarea></div>
                    </div>
                </div>

                <!-- التسعير -->
                <div class="card mb-4 p-4">
                    <h5 class="mb-3" style="color: var(--deep-purple); font-weight: bold;">التسعير والمخزون</h5>
                    <div class="row">
                        <div class="col-md-3 mb-3"><label>السعر</label><input type="number" class="form-control" id="price" value="{{ product.pricing.price or 0 }}"></div>
                        <div class="col-md-3 mb-3"><label>السعر السابق</label><input type="number" class="form-control" id="compareAtPrice" value="{{ product.pricing.compareAtPrice or 0 }}"></div>
                        <div class="col-md-3 mb-3"><label>التكلفة</label><input type="number" class="form-control" id="originalPrice" value="{{ product.pricing.originalPrice or 0 }}"></div>
                        <div class="col-md-3 mb-3"><label>الكمية</label><input type="number" class="form-control" id="quantity" value="{{ product.quantity or 0 }}"></div>
                    </div>
                </div>
            </div>

            <!-- الجانب الأيمن -->
            <div class="col-lg-4">
                <!-- الصور -->
                <div class="card mb-4 p-4">
                    <h5 class="mb-3" style="color: var(--deep-purple); font-weight: bold;">صور المنتج</h5>
                    <div class="row g-2">
                        {% for img in product.images or [] %}
                            <div class="col-6"><div class="img-card"><img src="{{ img.fileUrl }}" class="w-100 rounded"></div></div>
                        {% endfor %}
                        <div class="col-6">
                            <button type="button" class="btn btn-outline-secondary w-100 h-100" style="min-height: 80px;">
                                <i class="fas fa-plus"></i><br>إضافة
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- الإعدادات الإدارية -->
                <div class="card mb-4 p-4">
                    <h5 class="mb-3" style="color: var(--deep-purple); font-weight: bold;">حالة المنتج والمورد</h5>
                    <select class="form-select mb-3" id="status">
                        <option value="active" {% if product.status == 'active' %}selected{% endif %}>نشط</option>
                        <option value="draft" {% if product.status == 'draft' %}selected{% endif %}>مسودة</option>
                    </select>
                    <select class="form-select" id="supplier_id">
                        {% for s in suppliers %}
                        <option value="{{ s.id }}" {% if mapping.selected_supplier_id == s.id %}selected{% endif %}>{{ s.trade_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
        
        <button type="submit" id="saveBtn" class="btn btn-custom-purple btn-lg w-100 shadow-lg mb-5">
            <i class="fas fa-save me-2"></i>حفظ كافة التعديلات
        </button>
    </form>
</div>
{% endblock %}
