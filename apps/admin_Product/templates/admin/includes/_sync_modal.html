<div class="modal fade" id="syncModal" tabindex="-1" aria-labelledby="syncModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-3 shadow-lg">
      <div class="modal-header" style="background-color: var(--dark-purple); color: #fff;">
        <h5 class="modal-title fw-bold" id="syncModalLabel">
          <i class="fas fa-sync-alt me-2"></i> مزامنة المنتجات
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="إغلاق"></button>

      <div class="modal-body">

        </ul>
      </div>
      <div class="modal-footer">
        <form action="{{ url_for('admin_product_bp.sync_products') }}" method="POST">
          <button type="submit" class="btn btn-custom px-4 shadow-sm">
            <i class="fas fa-sync-alt me-1"></i> بدء المزامنة
          </button>
        </form>
        <button type="button" class="btn btn-secondary px-4 shadow-sm" data-bs-dismiss="modal">
          إلغاء
        </button>
      </div>
    </div>
  </div>
</div>
