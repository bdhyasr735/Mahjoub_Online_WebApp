<div class="modal fade" id="syncModal" tabindex="-1" aria-labelledby="syncModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="syncModalLabel">مزامنة المنتجات</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="sync-progress-area" class="d-none">
                    <div class="progress mb-3">
                        <div id="sync-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                    </div>
                    <p id="sync-status" class="text-center small text-muted">جاري البدء...</p>
                </div>
                <div id="sync-info">
                    <p>سيتم جلب البيانات المحدثة من قمرة وتحديث قاعدة بيانات "محجوب".</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
                <button type="button" id="startSyncBtn" class="btn btn-primary" onclick="startProductSync()">بدء المزامنة</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function startProductSync() {
        const btn = document.getElementById('startSyncBtn');
        const progressArea = document.getElementById('sync-progress-area');
        const progressBar = document.getElementById('sync-bar');
        const statusText = document.getElementById('sync-status');
        const infoArea = document.getElementById('sync-info');
        
        btn.disabled = true;
        infoArea.classList.add('d-none');
        progressArea.classList.remove('d-none');
        
        progressBar.style.width = '30%';
        statusText.innerText = "جاري الاتصال بالسيرفر وجلب البيانات...";
        
        try {
            // 1. جلب البيانات من الـ Proxy
            const response = await fetch("{{ url_for('admin_product_bp.proxy_sync') }}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': "{{ csrf_token() }}" 
                }
            });

            if (!response.ok) throw new Error("فشل الاتصال بخدمة المزامنة");

            const result = await response.json();
            // بما أن الـ proxy_sync سيعيد هيكل الـ GraphQL
            const products = result.data?.findAllProducts?.data;

            if (!products || products.length === 0) {
                throw new Error("لم يتم العثور على منتجات في المصدر");
            }

            progressBar.style.width = '60%';
            statusText.innerText = `تم جلب ${products.length} منتج، جاري المعالجة والحفظ...`;

            // 2. إرسال البيانات للمعالجة (تطابق الهيكل الذي أعددناه في save_sync)
            const saveResponse = await fetch("{{ url_for('admin_product_bp.save_sync') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': "{{ csrf_token() }}"
                },
                body: JSON.stringify({ data: { findAllProducts: { data: products } } })
            });

            const saveResult = await saveResponse.json();
            
            if (saveResponse.ok && saveResult.status === 'success') {
                progressBar.style.width = '100%';
                statusText.innerText = "تمت المزامنة بنجاح!";
                statusText.classList.add('text-success');
                setTimeout(() => { location.reload(); }, 1000);
            } else {
                throw new Error(saveResult.message || "فشل حفظ البيانات");
            }
            
        } catch (err) {
            statusText.innerText = "خطأ: " + err.message;
            statusText.classList.add('text-danger');
            btn.disabled = false;
        }
    }
</script>
