<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">قائمة المنتجات</h5>
        <button type="button" class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#syncModal">
            <i class="fas fa-sync-alt"></i> مزامنة المنتجات
        </button>
    </div>
    
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>م</th>
                    <th>اسم المنتج</th>
                    <th>السعر</th>
                    <th>SKU</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ product.title }}</td>
                    <td>{{ product.cost_price }} ر.س</td>
                    <td><span class="badge bg-light text-dark border">{{ product.sku }}</span></td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center">لا توجد منتجات لعرضها.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% include 'admin/includes/_sync_modal.html' %}

<script>
    async function startProductSync() {
        const btn = document.getElementById('startSyncBtn');
        const progressArea = document.getElementById('sync-progress-area');
        const progressBar = document.getElementById('sync-bar');
        const statusText = document.getElementById('sync-status');
        
        btn.disabled = true;
        progressArea.classList.remove('d-none');
        
        progressBar.style.width = '30%';
        statusText.innerText = "جاري الجلب عبر السيرفر...";
        statusText.className = "mt-2 small text-muted text-center";
        
        try {
            const proxyResponse = await fetch("{{ url_for('admin_product_bp.proxy_sync') }}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.content 
                }
            });

            if (!proxyResponse.ok) throw new Error("فشل الاتصال بخدمة المزامنة");

            const result = await proxyResponse.json();
            // تصحيح: البيانات تأتي مباشرة من result.data بناءً على التعديل في routes.py
            const products = result.data;
            
            if (!products || products.length === 0) throw new Error("لا توجد منتجات أو خطأ في الاتصال");

            progressBar.style.width = '60%';
            statusText.innerText = `تم جلب ${products.length} منتج، جاري الحفظ...`;

            const saveResponse = await fetch("{{ url_for('admin_product_bp.save_sync') }}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.content
                },
                body: JSON.stringify({ products: products })
            });

            const saveResult = await saveResponse.json();
            
            if (saveResponse.ok && saveResult.status === 'success') {
                progressBar.style.width = '100%';
                statusText.innerText = "تمت المزامنة بنجاح!";
                statusText.className = "mt-2 small text-success fw-bold text-center";
                setTimeout(() => { location.reload(); }, 1500);
            } else {
                throw new Error(saveResult.message || "فشل عملية الحفظ");
            }
        } catch (error) {
            console.error("Sync Error:", error);
            statusText.innerText = "خطأ: " + error.message;
            statusText.className = "mt-2 small text-danger fw-bold text-center";
            btn.disabled = false;
        }
    }
</script>
