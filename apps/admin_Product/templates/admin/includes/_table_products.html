<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">قائمة المنتجات</h5>
        <button type="button" class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#syncModal">
            <i class="fas fa-sync-alt"></i> مزامنة المنتجات
        </button>
    </div>
    
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>م</th>
                    <th>اسم المنتج</th>
                    <th>السعر</th>
                    <th>SKU</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ product.title }}</td>
                    <td>{{ product.cost_price }} ر.س</td>
                    <td><span class="badge bg-light text-dark border">{{ product.sku }}</span></td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center">لا توجد منتجات لعرضها.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% include 'admin/includes/_sync_modal.html' %}
