{% extends "admin/admin_base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between mb-4">
        <h4>إدارة المنتجات</h4>
        <div class="d-flex gap-2">
            <input type="text" id="liveSearch" class="form-control" placeholder="بحث...">
            <button class="btn btn-success" onclick="syncNow()">مزامنة</button>
        </div>
    </div>

    <div class="row" id="productContainer">
        {% for p in data.products %}
        <div class="col-lg-3 card p-2">{{ p.title }} - {{ p.price }} ر.س</div>
        {% endfor %}
    </div>

    <select id="perPageSelect" class="form-select mt-3" style="width: 150px;" onchange="fetchData(1)">
        <option value="25">25</option>
        <option value="100">100</option>
        <option value="9999">عرض الكل</option>
    </select>
</div>

<script>
function renderDashboard(data) {
    const container = document.getElementById('productContainer');
    container.innerHTML = data.products.map(p => `
        <div class="col-lg-3 col-md-4 mb-3">
            <div class="card p-3 shadow-sm">
                <h6>${p.title}</h6>
                <p>السعر: ${p.price} | الكمية: ${p.quantity}</p>
            </div>
        </div>`).join('');
}

function fetchData(page = 1) {
    const query = document.getElementById('liveSearch').value;
    const perPage = document.getElementById('perPageSelect').value;
    // استخدام المسار الصحيح المكتشف من السيرفر
    fetch(`/bridge/api/search?q=${encodeURIComponent(query)}&per_page=${perPage}&page=${page}`)
    .then(r => r.json())
    .then(data => renderDashboard(data));
}

document.getElementById('liveSearch').addEventListener('input', () => fetchData(1));

function syncNow() {
    fetch("/bridge/sync-now", { method: 'POST' })
    .then(() => fetchData(1));
}
</script>
{% endblock %}
