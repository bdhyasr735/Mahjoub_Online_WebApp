{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold"><i class="fas fa-box-open text-primary me-2"></i> إدارة الجسر</h5>
        <div class="d-flex gap-2">
            <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="بحث..." oninput="loadData(this.value)">
            <button class="btn btn-sm btn-primary" onclick="syncNow(this)">مزامنة</button>
        </div>
    </div>

    <div id="productContainer" class="row row-cols-1 row-cols-md-4 g-2">
        <div class="text-muted p-4">جاري تحميل البيانات...</div>
    </div>
</div>

<script>
// جلب وعرض البيانات (خفيف جداً ويعتمد على الذاكرة)
async function loadData(query = '') {
    const container = document.getElementById('productContainer');
    try {
        const res = await fetch(`/bridge/api/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        
        if (data.products.length === 0) {
            container.innerHTML = '<div class="col-12 text-center">لا توجد منتجات.</div>';
            return;
        }

        container.innerHTML = data.products.map(p => `
            <div class="col">
                <div class="card h-100 p-2 border-0 shadow-sm">
                    <small class="fw-bold text-truncate" title="${p.title}">${p.title}</small>
                    <div class="d-flex justify-content-between mt-1">
                        <span class="text-primary small">${p.pricing.price} ر.س</span>
                        <span class="badge bg-light text-dark small">${p.quantity} قطع</span>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = '<div class="col-12 text-danger">خطأ في الاتصال.</div>';
    }
}

// مزامنة البيانات (استدعاء عند الطلب فقط)
async function syncNow(btn) {
    btn.disabled = true;
    btn.innerText = "جاري...";
    await fetch('/bridge/sync', { method: 'POST' });
    btn.disabled = false;
    btn.innerText = "مزامنة";
    loadData();
}

// تشغيل تلقائي عند فتح الصفحة
loadData();
</script>
{% endblock %}
