{% extends "admin/admin_base.html" %}

{% block title %}إضافة منتج فردي | الإدارة المركزية{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-warning py-3">
                    <h5 class="mb-0"><i class="fas fa-plus-circle me-2"></i>إضافة منتج جديد يدوياً</h5>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('mahjoub_bridge.add_product_page') }}" method="POST">
                        <div class="row">
                            <!-- اسم المنتج -->
                            <div class="col-md-12 mb-3">
                                <label class="form-label font-weight-bold">اسم المنتج</label>
                                <input type="text" name="title" class="form-control" required placeholder="أدخل اسم المنتج كما يظهر للعملاء">
                            </div>
                            
                            <!-- السعر والكمية -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">السعر (ر.س)</label>
                                <input type="number" step="0.01" name="price" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الكمية المتوفرة</label>
                                <input type="number" name="quantity" class="form-control" value="0">
                            </div>

                            <!-- رابط الصورة والمورد -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">رابط الصورة</label>
                                <input type="url" name="image_url" class="form-control" placeholder="https://...">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">كود المورد (Supplier ID)</label>
                                <input type="text" name="supplier_id" class="form-control">
                            </div>

                            <!-- الوصف -->
                            <div class="col-md-12 mb-4">
                                <label class="form-label">وصف المنتج</label>
                                <textarea name="description" class="form-control" rows="4"></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('mahjoub_bridge.dashboard') }}" class="btn btn-outline-secondary">إلغاء</a>
                            <button type="submit" class="btn btn-warning px-4">حفظ المنتج في النظام</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
