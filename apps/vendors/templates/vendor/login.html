<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الموردين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* ألوان الموردين: تميل للأزرق الليلي والفضّي للتمييز عن ذهبي الإدارة */
            --vendor-silver: #C0C0C0;
            --deep-night: #0f172a;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, var(--deep-night) 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: #fff;
        }

        .vendor-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(192, 192, 192, 0.2);
            padding: 40px; text-align: center; width: 100%; max-width: 360px;
        }

        .logo-section img {
            width: 80px; margin-bottom: 15px;
            filter: brightness(0) invert(1) opacity(0.8);
        }

        .brand-name { font-size: 1.5rem; color: var(--vendor-silver); margin: 0; }
        .sub-text { font-size: 0.7rem; color: #94a3b8; margin-bottom: 30px; }

        .input-box { position: relative; margin-bottom: 20px; }
        .input-box input {
            width: 100%; padding: 15px 45px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; outline: none; box-sizing: border-box;
        }

        .main-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--vendor-silver); }
        .btn-access {
            width: 100%; padding: 14px; background: var(--vendor-silver);
            border: none; border-radius: 12px; color: var(--deep-night);
            font-weight: 900; cursor: pointer; transition: 0.4s;
        }
        .btn-access:hover { background: #e2e8f0; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="vendor-card">
        <div class="logo-section">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="Logo">
            <h1 class="brand-name">بوابة الموردين</h1>
            <p class="sub-text">منصة محجوب أونلاين للشراكات التجارية</p>
        </div>

        <form action="{{ url_for('vendors.login') }}" method="POST">
            <div class="input-box">
                <i class="fas fa-user main-icon"></i>
                <input type="text" name="username" placeholder="اسم المستخدم" required>
            </div>
            <div class="input-box">
                <i class="fas fa-key main-icon"></i>
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn-access">تسجيل الدخول</button>
        </form>
    </div>
</body>
</html>
