<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="انضم إلى منصة محجوب أونلاين كشريك تجاري. وسع نطاق عملك وادخل عالم التجارة الإلكترونية مع نظامنا المتطور.">
    <meta property="og:title" content="بوابة الشركاء | محجوب أونلاين">
    <meta property="og:description" content="ابدأ رحلة الشراكة التجارية الرقمية مع محجوب أونلاين.">
    <title>بوابة الشركاء | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05020a; --gold: #ce9e49; --card-bg: #0f071c; --text: #ffffff; --error: #ff4d4d; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .wrapper { width: 100%; max-width: 500px; background: var(--card-bg); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid #222; text-align: center; }
        h3 { color: var(--gold); font-size: 1.8rem; margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 10px rgba(206, 158, 73, 0.2); }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; color: #000; font-weight: 900; cursor: pointer; transition: 0.4s; margin-top: 15px; font-size: 1rem; }
        .btn-gold:hover { transform: scale(1.02); background: #e5b35a; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="auth-area" class="fade-in">
        <h3 id="form-title">ابدأ رحلة الشراكة</h3>
        <div id="auth-fields">
            <input type="email" id="email" placeholder="البريد الإلكتروني الرسمي" required>
            <div style="display: flex; gap: 10px;">
                <select id="country-code" style="width: 30%;">
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+967">🇾🇪 +967</option>
                </select>
                <input type="tel" id="phone" placeholder="رقم الهاتف" style="width: 70%;">
            </div>
            <button class="btn-gold" onclick="authGateway()">التالي</button>
        </div>
    </div>
</div>

<script>
    let userData = {};

    // تحسين الانتقال بين الخطوات
    function updateUI(title, html) {
        const area = document.getElementById('auth-area');
        area.classList.remove('fade-in');
        void area.offsetWidth; // إعادة تشغيل الـ Animation
        area.classList.add('fade-in');
        document.getElementById('form-title').innerText = title;
        area.innerHTML = `<h3>${title}</h3>` + html;
    }

    async function authGateway() {
        userData.email = document.getElementById('email').value;
        userData.phone = document.getElementById('phone').value;
        userData.country_code = document.getElementById('country-code').value;

        const res = await fetch('/vendors/auth-gateway', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(userData)});
        updateUI("التحقق من الهوية", `
            <p style="opacity: 0.8;">أدخل رمز التحقق المرسل إلى واتساب</p>
            <input type="text" id="otp-code" placeholder="------" style="text-align:center; font-size:1.5rem; letter-spacing: 5px;">
            <button class="btn-gold" onclick="verifyOTP()">تحقق الآن</button>
        `);
    }

    // (باقي الدوال verifyOTP و register تبقى كما هي مع استدعاء updateUI)
</script>
</body>
</html>
