<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الشركاء | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #05020a; --gold: #ce9e49; --card-bg: #0f071c; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .wrapper { display: flex; width: 90%; max-width: 900px; background: var(--card-bg); border: 1px solid #222; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .side { flex: 1; padding: 40px; }
        .login-side { border-left: 1px solid #222; }
        .marketing-side { background: #0a0614; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #000; }
        .btn-gold:hover { opacity: 0.9; }
        .resend-link { color: #888; font-size: 0.85rem; cursor: pointer; margin-top: 15px; display: block; text-decoration: underline; }
        .badge-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .badge { flex: 1; padding: 10px; background: #160d26; border: 1px solid #333; border-radius: 10px; text-align: center; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="side login-side" id="auth-area">
        <h3>بوابة الشركاء الكرام</h3>
        <div class="badge-row">
            <div class="badge">معرف النظام<br>MAH-SUP963</div>
            <div class="badge">المحفظة السيادية<br>MAH-WEL963</div>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <select id="country-code" style="width: 30%;">
                <option value="+966">🇸🇦 +966</option>
                <option value="+967" selected>🇾🇪 +967</option>
                <option value="+971">🇦🇪 +971</option>
            </select>
            <input type="tel" id="phone" placeholder="رقم الهاتف الإداري">
        </div>

        <button class="btn-gold" id="action-btn" onclick="sendOtp()">إرسال رمز التأكيد <i class="fas fa-paper-plane"></i></button>
        
        <div style="margin-top: 20px; text-align: center; color: var(--gold); cursor: pointer;" onclick="quickLogin()">
            <i class="fas fa-bolt"></i> دخول سريع
        </div>
    </div>

    <div class="side marketing-side">
        <h1 style="font-size: 1.8rem;">سوقك الذكي بأعلى المعايير</h1>
        <p style="color: #aaa;">نظام إدارة الموردين المتكامل، دقة في الحوكمة وسرعة في الإنجاز.</p>
    </div>
</div>

<script>
    let currentPhone = "";

    async function sendOtp() {
        const countryCode = document.getElementById('country-code').value;
        const phoneNum = document.getElementById('phone').value;
        currentPhone = countryCode + phoneNum;
        
        const res = await fetch('/vendors/login', { 
            method: 'POST', headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ phone: currentPhone }) 
        });
        
        const result = await res.json();
        
        if (result.status === 'success' || result.status === 'warning') {
            document.getElementById('auth-area').innerHTML = `
                <h3>التحقق من الهوية</h3>
                <p style="font-size: 0.85rem; color: #888;">تم إرسال رمز التحقق إلى: <strong style="color:#fff;">${currentPhone}</strong></p>
                <input type="text" id="otp" placeholder="أدخل الرمز المكون من 6 أرقام" maxlength="6">
                <button class="btn-gold" onclick="verify()">إتمام الدخول الآمن</button>
                <span class="resend-link" id="resend-btn" onclick="sendOtp()">إعادة إرسال الرمز؟</span>
            `;
        } else {
            alert(result.message);
        }
    }

    async function verify() {
        const otp = document.getElementById('otp').value;
        const res = await fetch('/vendors/login', { 
            method: 'POST', headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ phone: currentPhone, otp: otp }) 
        });
        
        const result = await res.json();
        if (result.status === 'success') {
            window.location.href = result.redirect;
        } else {
            alert(result.message);
        }
    }

    async function quickLogin() {
        const res = await fetch('/vendors/quick-login', { method: 'POST' });
        const result = await res.json();
        if (result.status === 'success') window.location.href = result.redirect;
    }
</script>
</body>
</html>
