<!-- apps/suppliers_product/templates/suppliers/includes/_product_pagination.html -->
{% if pagination and pagination.pages > 1 %}
<div class="d-flex justify-content-between align-items-center mt-3">
    <div class="text-muted small">
        عرض {{ pagination.start }} - {{ pagination.end }} من {{ pagination.total }} منتج
    </div>
    <nav>
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
                <a class="page-link" href="#" onclick="goToPage({{ pagination.prev_page or 1 }})">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </li>
            {% for page in pagination.pages_list %}
                {% if page == '...' %}
                    <li class="page-item disabled"><span class="page-link">…</span></li>
                {% else %}
                    <li class="page-item {% if page == pagination.current_page %}active{% endif %}">
                        <a class="page-link" href="#" onclick="goToPage({{ page }})">{{ page }}</a>
                    </li>
                {% endif %}
            {% endfor %}
            <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
                <a class="page-link" href="#" onclick="goToPage({{ pagination.next_page or pagination.pages }})">
                    <i class="fas fa-chevron-left"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>
{% endif %}
