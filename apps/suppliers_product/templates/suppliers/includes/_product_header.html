<!-- apps/suppliers_product/templates/suppliers/includes/_product_header.html -->
<div class="row align-items-center mb-4">
    <div class="col-md-4">
        <a href="{{ url_for('suppliers_dashboard.dashboard') }}" class="btn-back d-block mb-2">
            <i class="fas fa-arrow-right me-1"></i> رجوع للوحة التحكم
        </a>
        <h3 class="fw-bold mb-0 text-dark">
            <i class="fas fa-boxes text-muted me-2"></i> منتجاتي
        </h3>
        <h6 class="text-muted mt-2">
            عدد المنتجات الحالية: {{ products|length if products else 0 }}
        </h6>
    </div>
    
    <div class="col-md-4 search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" name="search" id="searchInput" class="form-control shadow-sm" 
               placeholder="ابحث عن منتج بالاسم أو SKU..." value="{{ search or '' }}">
    </div>

    <div class="col-md-4 text-md-end mt-3 mt-md-0">
        <a href="{{ url_for('add_product_bp.add_product') }}" class="btn btn-success px-4 shadow-sm">
            <i class="fas fa-plus me-1"></i> إضافة منتج
        </a>
        <button type="button" class="btn btn-outline-secondary px-4 shadow-sm" onclick="window.location.reload()">
            <i class="fas fa-sync-alt me-1"></i> تحديث
        </button>
    </div>
</div>
