<div class="card-custom p-4">
    <div class="table-responsive">
        <table class="table table-custom align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>اسم المستخدم</th>
                    <th>رقم الهاتف</th>
                    <th>التاريخ والوقت</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody>
                {% for staff in staff_list %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td class="fw-bold" style="color: #bb86fc;">{{ staff.username }}</td>
                    <td>{{ staff.search_phone }}</td>
                    <td class="text-muted small">{{ staff.created_at.strftime('%Y-%m-%d %I:%M %p') }}</td>
                    <td>
                        <span class="badge {{ 'bg-success' if staff.is_active else 'bg-secondary' }}">
                            {{ 'نشط' if staff.is_active else 'معطل' }}
                        </span>
                    </td>
                    <td>
                        <div class="btn-group">
                            <form action="{{ url_for('suppliers_permissions.staff_action', staff_id=staff.id, action='toggle_status') }}" method="POST" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-info" title="تغيير الحالة">
                                    <i class="fa fa-power-off"></i>
                                </button>
                            </form>
                            
                            <form action="{{ url_for('suppliers_permissions.staff_action', staff_id=staff.id, action='reset_password') }}" method="POST" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-warning" title="إعادة تعيين كلمة المرور">
                                    <i class="fa fa-key"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
