<div class="modal fade" id="staffCredentialsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-custom">
            <div class="modal-body text-center p-4">
                <h5 class="text-success mb-3">تم إنشاء الموظف بنجاح</h5>
                <div class="bg-dark p-3 rounded">
                    <p>المستخدم: <strong id="newUsername" style="color:#bb86fc"></strong></p>
                    <p>كلمة المرور: <strong id="newPassword" style="color:#e5c158"></strong></p>
                </div>
                <button class="btn btn-gold w-100 mt-3" onclick="copyCreds()">نسخ البيانات</button>
            </div>
        </div>
    </div>
</div>

<script>
    function copyCreds() {
        const text = "المستخدم: " + document.getElementById('newUsername').innerText + "\nكلمة المرور: " + document.getElementById('newPassword').innerText;
        navigator.clipboard.writeText(text);
        alert("تم النسخ!");
    }
</script>
