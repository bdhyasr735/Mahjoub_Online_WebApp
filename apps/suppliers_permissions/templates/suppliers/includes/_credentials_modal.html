<div class="modal fade" id="staffCredentialsModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: 2px solid #5b4cd1; overflow: hidden;">
            <div class="modal-header border-0 text-center d-block" style="background-color: #f8f9fa;">
                <h5 class="modal-title fw-bold text-success"><i class="fa fa-check-circle me-2"></i> تم إضافة الموظف بنجاح</h5>
            </div>
            <div class="modal-body text-center p-4">
                <p class="text-muted">يرجى حفظ بيانات الدخول التالية للموظف:</p>
                
                <div class="p-3 mb-3" style="background: #fdf5ff; border: 1px dashed #5b4cd1; border-radius: 12px;">
                    <p class="mb-2">اسم المستخدم: <strong id="newUsername" style="color: #6c5ce7; font-size: 1.2rem;"></strong></p>
                    <p class="mb-0">كلمة المرور: <strong id="newPassword" style="color: #d63031; font-size: 1.2rem;"></strong></p>
                </div>
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">إغلاق</button>
                <button type="button" class="btn text-white px-4" style="background-color: #5b4cd1;" onclick="copyCredentials()">
                    <i class="fa fa-copy me-1"></i> نسخ البيانات
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // وظيفة النسخ الاحترافية
    function copyCredentials() {
        const username = document.getElementById('newUsername').innerText;
        const password = document.getElementById('newPassword').innerText;
        const textToCopy = `اسم المستخدم: ${username}\nكلمة المرور: ${password}`;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("تم نسخ البيانات إلى الحافظة!");
        });
    }

    // إظهار المودال تلقائياً إذا كان هناك موظف جديد
    {% if new_staff %}
    window.addEventListener('DOMContentLoaded', (event) => {
        document.getElementById('newUsername').innerText = "{{ new_staff.username }}";
        document.getElementById('newPassword').innerText = "{{ new_staff.raw_password }}";
        var myModal = new bootstrap.Modal(document.getElementById('staffCredentialsModal'));
        myModal.show();
    });
    {% endif %}
</script>
