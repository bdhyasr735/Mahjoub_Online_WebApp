{% extends "admin/admin_base.html" %}
{% block content %}
<div class="container-fluid">
    <div class="card glass-card p-4">
        <select id="supplierSearch" class="form-control" style="width: 100%"></select>
    </div>

    <div class="row mt-4" id="dashboard" style="display:none;">
        <div class="col-md-3"><div class="card p-3"><h6>صافي الربح</h6><h3 id="profitVal">0</h3></div></div>
        <div class="col-md-3"><div class="card p-3"><h6>رصيد YER</h6><h3 id="yerVal">0</h3></div></div>
        <div class="col-md-3"><div class="card p-3"><h6>رصيد SAR</h6><h3 id="sarVal">0</h3></div></div>
        <div class="col-md-3"><div class="card p-3"><h6>رصيد USD</h6><h3 id="usdVal">0</h3></div></div>
    </div>

    <table class="table mt-4">
        <thead><tr><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr></thead>
        <tbody id="stmtBody"></tbody>
    </table>
</div>

<script>
$('#supplierSearch').select2({
    ajax: { url: '/api/suppliers/search', dataType: 'json' }
}).on('select2:select', function(e) {
    let id = e.params.data.id;
    fetch('/api/statement/data?id=' + id)
    .then(res => res.json())
    .then(data => {
        document.getElementById('dashboard').style.display = 'flex';
        document.getElementById('profitVal').innerText = data.total_profit;
        document.getElementById('yerVal').innerText = data.wallet.yer;
        // ملء الجدول هنا...
    });
});
</script>
{% endblock %}
