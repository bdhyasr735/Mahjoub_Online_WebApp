{% extends "admin/admin_base.html" %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />

<style>
    :root { --mahjoub-purple: #632C8F; }
    .mahjoub-toolbar { background: #fff; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-right: 5px solid var(--mahjoub-purple); }
    .stat-card { border-radius: 15px; border: none; color: white; padding: 20px; transition: transform 0.2s ease; }
    .stat-card:hover { transform: translateY(-3px); }
    .bg-profit { background: var(--mahjoub-purple); }
    .bg-debit { background: #d32f2f; }
    .bg-credit { background: #2e7d32; }
    .bg-balance { background: #1565c0; }
    .btn-wallet { background-color: #007bff; color: white; border-radius: 10px; }
    .btn-wallet:hover { background-color: #0069d9; color: white; }
    
    .select2-container--default .select2-selection--single { height: 45px !important; padding: 8px !important; border: 1px solid #ced4da; border-radius: 10px; }
    .btn-mahjoub { background-color: var(--mahjoub-purple); color: white; border-radius: 10px; }
    .btn-pdf { background-color: #27ae60; color: white; border-radius: 10px; }
    .text-purple { color: var(--mahjoub-purple); }
</style>

<div class="container-fluid py-4" style="direction: rtl; text-align: right;">
    <div class="card mahjoub-toolbar p-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="small fw-bold text-muted mb-2">البحث عن مورد</label>
                <select id="supplierSearch" class="form-control" style="width: 100%;"></select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-wallet w-100 py-2" onclick="loadAllWalletsSummary()">
                    <i class="fas fa-wallet"></i> ملخص المحافظ
                </button>
            </div>
            <div class="col-md-3">
                <label class="small fw-bold text-muted mb-2">تحديد الفترة</label>
                <div id="reportrange" class="form-control" style="cursor: pointer; height: 45px; display: flex; align-items: center; border-radius: 10px;">
                    <i class="fa fa-calendar me-2 text-muted"></i> <span></span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="d-flex gap-2">
                    <button class="btn btn-mahjoub flex-grow-1 py-2" onclick="loadFinancialData()"><i class="fas fa-sync"></i> تحديث</button>
                    <button id="btnExportPDF" class="btn btn-pdf flex-grow-1 py-2"><i class="fas fa-file-pdf"></i> طباعة</button>
                </div>
            </div>
        </div>
    </div>

    <div id="summaryCards" class="row mb-4">
        <div class="col-md-3"><div class="card stat-card bg-profit"><h6>إجمالي الأرباح</h6><h2 id="totalProfit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-debit"><h6>إجمالي المدين</h6><h2 id="totalDebit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-credit"><h6>إجمالي الدائن</h6><h2 id="totalCredit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-balance"><h6>صافي الرصيد</h6><h2 id="netBalance">0.00</h2></div></div>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light" id="tableHeader">
                    <tr><th>التاريخ</th><th>البيان</th><th>المرجع</th><th>العملة</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr>
                </thead>
                <tbody id="statementBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

<script>
    // جلب ملخص كافة المحافظ للمنصة
    function loadAllWalletsSummary() {
        $('#summaryCards').fadeOut();
        $('#tableHeader').html('<tr><th>الاسم التجاري</th><th>اسم المالك</th><th>كود المحفظة</th><th>الرصيد الحالي</th><th>الحالة</th></tr>');
        $('#statementBody').html('<tr><td colspan="5" class="text-center py-5"><i class="fas fa-spinner fa-spin"></i> جاري تحميل بيانات المحافظ...</td></tr>');
        
        fetch("{{ url_for('statement_blueprint.api_get_all_summary') }}")
        .then(res => res.json())
        .then(data => {
            let html = '';
            data.results.forEach(s => {
                html += `<tr>
                    <td class="fw-bold">${s.trade_name}</td>
                    <td>${s.owner_name}</td>
                    <td><code>${s.wallet_code}</code></td>
                    <td class="fw-bold">${s.balance.toLocaleString()}</td>
                    <td><span class="badge ${s.balance >= 0 ? 'bg-success' : 'bg-danger'}">${s.balance >= 0 ? 'رصيد دائن' : 'رصيد مدين'}</span></td>
                </tr>`;
            });
            $('#statementBody').html(html);
        });
    }

    // [أضف هنا الدوال loadFinancialData الخاصة بك كما كانت سابقاً]
    // ملاحظة: تأكد عند نهاية loadFinancialData من إعادة تعيين الـ tableHeader إلى القيم الأصلية (التاريخ، البيان، الخ...)
</script>
{% endblock %}
