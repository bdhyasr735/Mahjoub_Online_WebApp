{% extends "admin/admin_base.html" %}

{% block title %}تعميد مورد | محجوب أونلاين{% endblock %}

{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<div class="container-fluid py-4">
    <form id="mainSupplierForm" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="full_encrypted_data" id="full-encrypted-data">
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4 h-100 shadow-sm border-0">
                    <h5 class="fw-bold mb-3">📍 الهوية والتصنيف</h5>
                    <input type="text" id="owner_name" class="form-control mb-2" placeholder="اسم المالك" required>
                    <input type="text" id="owner_number" class="form-control mb-2" placeholder="رقم المالك (الهوية/الرقم الوطني)" required>
                    <input type="text" id="owner_phone" class="form-control mb-2" placeholder="رقم هاتف المالك" required>
                    <input type="text" id="shop_name" class="form-control mb-2" placeholder="الاسم التجاري" required>
                    <input type="text" id="shop_number" class="form-control mb-2" placeholder="رقم المحل" required>
                    
                    <select id="province" class="form-select mb-2" onchange="updateDistricts()">
                        <option value="">اختر المحافظة...</option>
                        <option value="الحديدة">الحديدة</option>
                        <option value="عدن">عدن</option>
                    </select>
                    <select id="district" class="form-select mb-2">
                        <option value="">اختر المديرية...</option>
                    </select>
                    <input type="text" id="detailed_address" class="form-control mb-2" placeholder="العنوان التفصيلي (الشارع/الحي)">
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 h-100 shadow-sm border-0">
                    <h5 class="fw-bold mb-3">💰 الربط والسيادة المالية</h5>
                    <select id="fin_type" class="form-select mb-2" onchange="updateFinancialOptions()">
                        <option value="">اختر نوع الجهة...</option>
                        <option value="بنوك">بنوك ومؤسسات مصرفية</option>
                        <option value="شركات صرافة">شركات وشبكات صرافة</option>
                    </select>
                    <select id="fin_name" class="form-select mb-2" style="display:none;"></select>
                    <input type="text" id="bank_acc" class="form-control mb-2" placeholder="رقم الحساب / الآيبان" required>
                    <div class="alert alert-info small mt-3">تنبيه: سيتم تشفير كافة المدخلات لحظياً قبل الإرسال.</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 h-100 shadow-sm border-0">
                    <h5 class="fw-bold mb-3">🛡️ بيانات الوصول والوثائق</h5>
                    <input type="text" id="username" class="form-control mb-2" placeholder="اسم المستخدم (Login)">
                    <input type="password" id="password" class="form-control mb-2" placeholder="كلمة المرور">
                    <input type="text" id="doc_number" class="form-control mb-2" placeholder="رقم الوثيقة">
                    <input type="file" id="doc_images" class="form-control mb-3" multiple>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">اعتماد المورد الآن</button>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    function updateDistricts() {
        const prov = document.getElementById('province').value;
        const dist = document.getElementById('district');
        const options = { 'الحديدة': ['الخوخة', 'حيس'], 'عدن': ['المعلا', 'كريتر'] };
        dist.innerHTML = '<option value="">اختر المديرية...</option>';
        (options[prov] || []).forEach(d => dist.innerHTML += `<option value="${d}">${d}</option>`);
    }

    function updateFinancialOptions() {
        const type = document.getElementById('fin_type').value;
        const name = document.getElementById('fin_name');
        name.style.display = type ? 'block' : 'none';
        name.innerHTML = type === 'بنوك' ? '<option>بنك الكريمي</option><option>بنك التضامن</option>' : '<option>شركة العمقي</option><option>شركة النجم</option>';
    }

    document.getElementById('mainSupplierForm').onsubmit = function(e) {
        e.preventDefault();
        // تجميع كافة البيانات للتشفير
        const data = {
            owner_name: document.getElementById('owner_name').value,
            owner_number: document.getElementById('owner_number').value,
            owner_phone: document.getElementById('owner_phone').value,
            shop_name: document.getElementById('shop_name').value,
            shop_number: document.getElementById('shop_number').value,
            province: document.getElementById('province').value,
            district: document.getElementById('district').value,
            detailed_address: document.getElementById('detailed_address').value,
            fin_type: document.getElementById('fin_type').value,
            fin_name: document.getElementById('fin_name').value,
            bank_acc: document.getElementById('bank_acc').value,
            username: document.getElementById('username').value,
            doc_number: document.getElementById('doc_number').value
        };
        
        const encrypted = CryptoJS.AES.encrypt(JSON.stringify(data), "SECRET_KEY_2026").toString();
        document.getElementById('full-encrypted-data').value = encrypted;
        this.submit();
    };
</script>
{% endblock %}
