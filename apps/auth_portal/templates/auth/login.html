
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الوصول السيادية | محجوب أونلاين</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --royal-purple: #1a0b2e;
            --mahjoub-gold: #D4AF37;
            --deep-black: #08020d;
        }

        body {
            background: radial-gradient(circle at center, var(--royal-purple) 0%, var(--deep-black) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* حاوية الدخول الزجاجية */
        .login-card {
            background: rgba(26, 11, 46, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 3.5rem 2.5rem;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(212, 175, 55, 0.1);
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, var(--mahjoub-gold), transparent);
            border-radius: 30px;
            z-index: -1;
            opacity: 0.3;
        }

        .logo-login {
            width: 100px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        h2 {
            color: #fff;
            font-weight: 900;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .system-tag {
            color: var(--mahjoub-gold);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #fff;
            padding: 14px;
            border-radius: 15px;
            margin-bottom: 1.2rem;
            text-align: center;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--mahjoub-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            color: #fff;
        }

        .btn-login {
            background: linear-gradient(45deg, #D4AF37, #f1c40f);
            color: var(--royal-purple);
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.1rem;
            transition: 0.4s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);
            letter-spacing: 1px;
        }

        .footer-note {
            margin-top: 2.5rem;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-login" alt="Logo">
        
        <h2>الوصول السيادي</h2>
        <div class="system-tag">Sovereign Access Control</div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 mb-3" style="font-size: 0.8rem; border-radius: 10px;">
                <i class="fas fa-exclamation-triangle me-2"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="معرف القائد" required autocomplete="off">
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control" placeholder="شفيرة العبور" required>
            </div>
            
            <button type="submit" class="btn-login">تفعيل الدخول</button>
        </form>

        <div class="footer-note">
            <i class="fas fa-shield-halved me-1"></i> محمي بنظام التشفير المركزي - محجوب أونلاين 2026
        </div>
    </div>

</body>
</html>
