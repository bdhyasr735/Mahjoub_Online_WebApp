<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الوصول السيادية</title>
    </head>
<body>
    <div class="sovereign-card">
        <div class="logo-section">
            <h1 class="brand-name">محجوب أونلاين</h1>
            <p class="philosophy-text">بوابة الحوكمة الرقمية المشفرة</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth_portal.login') }}" autocomplete="off" id="loginForm">
            <div class="input-box">
                <i class="fas fa-user-shield main-icon"></i>
                <input type="text" name="username" placeholder="الهوية الرقمية" required>
            </div>
            <div class="input-box">
                <i class="fas fa-lock main-icon"></i>
                <input type="password" name="password" id="password-field" placeholder="مفتاح التشفير" required>
            </div>
            <button type="submit" class="btn-access">دخول آمن</button>
        </form>
    </div>
    </body>
</html>
