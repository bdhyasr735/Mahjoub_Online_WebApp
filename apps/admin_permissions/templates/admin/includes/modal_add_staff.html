<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<div class="modal fade" id="addStaffModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form id="addStaffForm" action="{{ url_for('admin_permissions.assign_permissions') }}" class="modal-content gold-border">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="modal-header bg-light text-royal">
                <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i> إضافة موظف جديد</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3 position-relative">
                    <label class="form-label fw-bold">اسم المستخدم</label>
                    <input type="text" name="username" id="usernameInput" class="form-control" placeholder="يجب أن يكون فريداً" required oninput="checkAll()">
                    <span id="userStatus" class="position-absolute" style="left: 15px; top: 35px;"></span>
                </div>

                <div class="mb-3 position-relative">
                    <label class="form-label fw-bold">رقم الهاتف</label>
                    <input type="tel" name="phone" id="phoneInput" class="form-control" placeholder="7xxxxxxxx" maxlength="9" required oninput="checkAll()">
                    <span id="phoneStatus" class="position-absolute" style="left: 15px; top: 35px;"></span>
                    <small id="phoneHelper" class="text-muted">يجب أن يبدأ بـ 7 ويتكون من 9 أرقام</small>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">نوع الصلاحية</label>
                    <select name="type" id="staffTypeSelect" class="form-select" onchange="toggleSupplierField(this.value); checkAll()">
                        <option value="admin">إدارة مركزية</option>
                        <option value="supplier">موظف شريك</option>
                    </select>
                </div>

                <div class="mb-3" id="supplierContainer" style="display:none;">
                    <label class="form-label fw-bold">اختر المتجر/المورد</label>
                    <select name="supplier_id" id="supplierField" class="form-select">
                        {% for sup in suppliers %}
                        <option value="{{ sup.id }}">{{ sup.trade_name }} - ({{ sup.supplier_code }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button type="submit" id="submitBtn" class="btn btn-royal" disabled>حفظ البيانات</button>
            </div>
        </form>
    </div>
</div>

<script>
    // تهيئة Choices.js
    const supplierSelect = document.getElementById('supplierField');
    const choices = new Choices(supplierSelect, { searchEnabled: true, itemSelectText: '' });

    function toggleSupplierField(val) {
        document.getElementById('supplierContainer').style.display = (val === 'supplier') ? 'block' : 'none';
    }

    // التحقق اللحظي
    async function checkAll() {
        const username = document.getElementById('usernameInput').value;
        const phone = document.getElementById('phoneInput').value;
        const type = document.getElementById('staffTypeSelect').value;
        const submitBtn = document.getElementById('submitBtn');
        const phoneStatus = document.getElementById('phoneStatus');

        if (!/^[7]\d{8}$/.test(phone)) {
            phoneStatus.innerHTML = '⚠️';
            submitBtn.disabled = true;
            return;
        }

        const [userRes, phoneRes] = await Promise.all([
            fetch(`/admin/permissions/check-user?username=${username}`),
            fetch(`/admin/permissions/check-phone?phone=${phone}&type=${type}`)
        ]);

        const uStatus = await userRes.json();
        const pStatus = await phoneRes.json();

        document.getElementById('userStatus').innerHTML = uStatus.available ? '✅' : '❌';
        phoneStatus.innerHTML = pStatus.available ? '✅' : '❌';

        submitBtn.disabled = !(uStatus.available && pStatus.available);
    }

    // إرسال النموذج (التعامل مع الـ DOM بشكل صحيح)
    document.getElementById('addStaffForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

        try {
            const res = await fetch(this.action, { 
                method: 'POST', 
                body: new FormData(this) 
            });
            const data = await res.json();
            
            if(data.success) {
                // إغلاق المودال الحالي
                const modalEl = document.getElementById('addStaffModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();

                // تحديث بيانات مودال النجاح
                document.getElementById('successUsername').innerText = data.username;
                document.getElementById('successPassword').innerText = data.password;

                // إظهار مودال النجاح (استخدام الطريقة المباشرة لـ Bootstrap)
                const successModal = new bootstrap.Modal(document.getElementById('modalSuccess'));
                successModal.show();
                
                this.reset(); // تصفير الفورم
            } else {
                alert('خطأ: ' + data.message);
            }
        } catch (err) {
            console.error(err);
            alert('حدث خطأ أثناء الاتصال بالسيرفر');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'حفظ البيانات';
        }
    });
</script>
