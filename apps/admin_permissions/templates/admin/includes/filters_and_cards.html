<div class="row mb-4">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 bg-light">
            <div class="card-body d-flex align-items-center">
                <div class="bg-royal p-3 rounded text-white me-3">
                    <i class="fas fa-users fa-lg"></i>
                </div>
                <div>
                    <h6 class="text-muted mb-0">إجمالي الموظفين</h6>
                    <h4 class="fw-bold mb-0" id="totalStaffCount">{{ staff|length }}</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-8 d-flex align-items-center justify-content-md-end">
        <div class="btn-group shadow-sm" role="group" aria-label="Filters">
            <a href="{{ url_for('admin_permissions.roles_list', type='admin') }}" 
               class="btn {{ 'btn-royal' if type_filter == 'admin' else 'btn-outline-royal' }} px-4 py-2">
               <i class="fas fa-user-shield me-1"></i> الإدارة المركزية
            </a>
            
            <a href="{{ url_for('admin_permissions.roles_list', type='supplier') }}" 
               class="btn {{ 'btn-royal' if type_filter == 'supplier' else 'btn-outline-royal' }} px-4 py-2">
               <i class="fas fa-store me-1"></i> موظفي الشركاء
            </a>
        </div>
    </div>
</div>
