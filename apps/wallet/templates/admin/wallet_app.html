{% extends "admin/admin_base.html" %}

{% block content %}
<style>
    /* تصميم البطاقات المطور */
    .mahjoub-card { border-radius: 20px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: #fff; }
    .stat-box { border-radius: 15px; padding: 20px; color: #fff; transition: 0.3s; position: relative; overflow: hidden; }
    .stat-box:hover { transform: translateY(-5px); }
    .bg-gradient-sar { background: linear-gradient(135deg, #2c3e50, #4a6785); }
    .bg-gradient-yer { background: linear-gradient(135deg, #27ae60, #2ecc71); }
    .bg-gradient-usd { background: linear-gradient(135deg, #2980b9, #3498db); }
    
    /* تحسينات الجدول */
    .table thead { background-color: #f8f9fa; }
    .pagination .page-link { border-radius: 10px; margin: 0 5px; }
</style>

<div class="container-fluid py-4">
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-box bg-gradient-sar">
                <small class="text-white-50">إجمالي أرصدة النظام (SAR)</small>
                <h3 class="fw-bold">{{ total_system_sar }}</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-box bg-gradient-yer">
                <small class="text-white-50">إجمالي أرصدة النظام (YER)</small>
                <h3 class="fw-bold">{{ total_system_yer }}</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-box bg-gradient-usd">
                <small class="text-white-50">إجمالي أرصدة النظام (USD)</small>
                <h3 class="fw-bold">{{ total_system_usd }}</h3>
            </div>
        </div>
    </div>

    <div class="mahjoub-card p-4">
        <h5 class="mb-3 text-primary"><i class="fas fa-search"></i> بحث ذكي في الموردين</h5>
        <div class="input-group input-group-lg">
            <select id="supplierSearch" class="form-control"></select>
            <button class="btn btn-primary px-4" onclick="loadWallet()">عرض المحفظة</button>
        </div>
    </div>

    <div id="walletDisplayArea" class="mt-4">
        <div class="text-center py-5 text-muted">
            <i class="fas fa-wallet fa-4x mb-3 opacity-25"></i>
            <h5>يرجى تحديد مورد لعرض كشف الحساب</h5>
        </div>
    </div>
</div>

<script>
    // الدالة الرئيسية لجلب البيانات
    function loadWallet() {
        let supplierId = $('#supplierSearch').val();
        if(!supplierId) return;
        
        // جلب المحفظة (الافتراضي صفحة 1)
        fetch(`/wallet/view/${supplierId}?page=1`)
        .then(r => r.text())
        .then(html => {
            document.getElementById('walletDisplayArea').innerHTML = html;
        });
    }

    // دالة التنقل بين الصفحات (تُستخدم داخل ملف detail الملحق)
    function loadWalletPage(supplierId, page) {
        fetch(`/wallet/view/${supplierId}?page=${page}`)
        .then(r => r.text())
        .then(html => {
            document.getElementById('walletDisplayArea').innerHTML = html;
        });
    }
</script>
{% endblock %}
