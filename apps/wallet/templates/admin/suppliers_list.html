<table class="table table-hover align-middle">
    <thead class="table-dark">
        <tr>
            <th>المورد</th>
            <th>الهاتف</th>
            <th>الإجراءات</th>
        </tr>
    </thead>
    <tbody>
        {% for s in suppliers.items %}
        <tr>
            <td>{{ s.trade_name }}</td>
            <td>{{ s.phone }}</td>
            <td>
                <button class="btn btn-sm btn-info" onclick="loadWalletFromTable({{ s.id }})">
                    <i class="fas fa-eye"></i> كشف الحساب
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<nav>
    <ul class="pagination">
        {% for page_num in suppliers.iter_pages() %}
            <li class="page-item {{ 'active' if page_num == suppliers.page }}">
                <a class="page-link" href="#" onclick="loadSuppliersTable({{ page_num }})">{{ page_num }}</a>
            </li>
        {% endfor %}
    </ul>
</nav>
