{% extends "admin/admin_base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <div class="mahjoub-card mt-4 p-3">
        <h5>بحث سريع في الموردين</h5>
        <select id="supplierSearch" class="form-control" style="width: 100%;"></select>
        <button class="btn btn-primary mt-2" onclick="loadWallet()">عرض كشف المحفظة</button>
    </div>
    <div id="tableContent" class="mt-4"></div>
    <div id="walletDisplayArea" class="mt-4"></div>
</div>

<script>
$(document).ready(function() {
    $('#supplierSearch').select2({
        theme: 'bootstrap-5',
        ajax: { 
            url: '/wallet/search_suppliers', dataType: 'json', delay: 250,
            data: p => ({q: p.term}), processResults: data => ({results: data.results})
        }
    });
    loadSuppliersTable(1);
});

function loadSuppliersTable(page) {
    fetch(`/wallet/get_suppliers_list?page=${page}`).then(r => r.text()).then(h => $('#tableContent').html(h));
}

function loadWallet() {
    let id = $('#supplierSearch').val();
    if(id) fetch(`/wallet/view/${id}`).then(r => r.text()).then(h => $('#walletDisplayArea').html(h));
}

function loadWalletFromTable(id) {
    $('#supplierSearch').val(id).trigger('change');
    loadWallet();
}
</script>
{% endblock %}
