{% extends 'admin/admin_base.html' %}

{% block title %}القيادة المركزية | الإحصائيات{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- عنوان الصفحة -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold" style="color: var(--royal-purple);">لوحة تحكم النظام</h3>
        <button class="btn btn-gold text-white" style="background: var(--mahjoub-gold);">
            <i class="fas fa-sync-alt"></i> تحديث البيانات
        </button>
    </div>

    <!-- كروت الإحصائيات -->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 border-0 shadow-sm">
                <h6 class="text-muted">إجمالي الموردين</h6>
                <h2 class="fw-bold">{{ total_suppliers }}</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 border-0 shadow-sm">
                <h6 class="text-muted">الرصيد الكلي</h6>
                <h2 class="fw-bold text-success">{{ total_balance }} ريال</h2>
            </div>
        </div>
    </div>
</div>
{% endblock %}
