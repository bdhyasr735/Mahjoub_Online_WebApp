{% extends "admin_base.html" %}

{% block title %}مركز المراقبة | محجوب أونلاين{% endblock %}

{% block content %}
<!-- بداية منطقة المحتوى التي يتم جلبها عبر AJAX -->
<div id="main-content">
    <div class="row g-4">
        <!-- كرت إحصائي 1 -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3" style="border-right: 5px solid var(--mahjoub-gold) !important;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-3 me-3">
                        <i class="fas fa-users fa-2x text-primary"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">المستخدمين النشطين</h6>
                        <h3 class="fw-bold mb-0">1,250</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- كرت إحصائي 2 -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3" style="border-right: 5px solid var(--mahjoub-gold) !important;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-3 me-3">
                        <i class="fas fa-shopping-cart fa-2x text-success"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">الطلبات اليومية</h6>
                        <h3 class="fw-bold mb-0">85</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- كرت إحصائي 3 -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3" style="border-right: 5px solid var(--mahjoub-gold) !important;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-3 me-3">
                        <i class="fas fa-chart-line fa-2x text-warning"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">حالة النظام</h6>
                        <h3 class="fw-bold mb-0 text-success">مستقر</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- قسم الرسالة الترحيبية -->
    <div class="mt-5 p-5 bg-white rounded-4 shadow-sm text-center">
        <h2 class="fw-bold" style="color: var(--royal-purple);">مرحباً بك في القيادة المركزية</h2>
        <p class="text-muted">هنا يمكنك إدارة كافة عمليات "محجوب أونلاين" السيادية.</p>
        <button class="btn btn-gold px-4 py-2" style="background: var(--mahjoub-gold); color: white; border-radius: 8px;">
            تحديث البيانات <i class="fas fa-sync-alt ms-2"></i>
        </button>
    </div>
</div>
{% endblock %}
