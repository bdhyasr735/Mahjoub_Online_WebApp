<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}القيادة المركزية | محجوب أونلاين{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --royal-purple: #632C8F;
            --royal-purple-dark: #2a113e;
            --deep-black: #08020d;
            --mahjoub-gold: #D4AF37;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --sidebar-width: 280px;
            --transition: all 0.3s ease;
        }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; display: flex; direction: rtl; }
        
        .sidebar { 
            width: var(--sidebar-width); background-color: var(--royal-purple-dark); 
            height: 100vh; position: fixed; right: 0; top: 0; z-index: 1100;
            box-shadow: -5px 0 25px rgba(0,0,0,0.15); display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 2rem 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .logo-img { width: 70px; filter: brightness(0) invert(1) drop-shadow(0 0 8px rgba(255, 255, 255, 0.3)); margin-bottom: 10px; }
        .nav-menu { padding: 1rem; flex-grow: 1; overflow-y: auto; }
        .nav-link, .dropdown-btn { 
            display: flex; align-items: center; padding: 12px 15px; color: rgba(255, 255, 255, 0.85); 
            text-decoration: none; border-radius: 12px; margin-bottom: 5px; transition: var(--transition);
            border: none; background: transparent; width: 100%; font-weight: 600; text-align: right;
        }
        .nav-link:hover, .dropdown-btn:hover, .nav-link.active { background: rgba(255, 255, 255, 0.1); color: var(--mahjoub-gold); }
        .dropdown-container { display: none; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 5px; }
        .dropdown-container a { padding: 10px 40px; font-size: 0.9rem; color: rgba(255, 255, 255, 0.7); display: block; text-decoration: none; }
        .dropdown-container a:hover { color: var(--mahjoub-gold); padding-right: 45px; }
        .main-wrapper { margin-right: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); min-height: 100vh; }
        .top-bar { background: var(--glass-bg); backdrop-filter: blur(10px); height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .user-badge { background: rgba(99, 44, 143, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--royal-purple); color: var(--royal-purple); font-weight: 700; font-size: 0.9rem; }
        .rotate { transform: rotate(-90deg); }
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loader" class="d-none">
        <div class="spinner-border" style="width: 3rem; height: 3rem; color: var(--royal-purple);"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img" alt="Logo">
            <h5 class="text-white fw-bold mb-0">محجوب أونلاين</h5>
        </div>

        <nav class="nav-menu">
            <a href="{{ url_for('admin_dashboard.dashboard') }}" class="nav-link {% if request.endpoint == 'admin_dashboard.dashboard' %}active{% endif %}">
                <i class="fas fa-chart-line me-3"></i> <span>مركز القيادة</span>
            </a>

            <button class="dropdown-btn" onclick="toggleDropdown('supplierDropdown', this)">
                <i class="fas fa-handshake me-3"></i> <span>شركاء النجاح</span>
                <i class="fas fa-chevron-left ms-auto transition"></i>
            </button>
            <div class="dropdown-container" id="supplierDropdown">
                <a href="{{ url_for('add_supplier.add_supplier_page') }}"><i class="fas fa-user-plus me-2"></i> تعميد مورد جديد</a>
                <a href="#"><i class="fas fa-database me-2"></i> سجل الموردين</a>
            </div>

            <button class="dropdown-btn" onclick="toggleDropdown('walletDropdown', this)">
                <i class="fas fa-wallet me-3"></i> <span>إدارة العمليات المالية</span>
                <i class="fas fa-chevron-left ms-auto transition"></i>
            </button>
            <div class="dropdown-container" id="walletDropdown">
                <a href="{{ url_for('financial_ops.display_management_table') }}"><i class="fas fa-scale-balanced me-2"></i> الطلبات والتسويات</a>
                <a href="{{ url_for('statement_blueprint.view_statement') }}"><i class="fas fa-file-invoice-dollar me-2"></i> كشوفات الحسابات</a>
            </div>

            <a href="{{ url_for('auth_portal.logout') }}" class="nav-link text-danger mt-5">
                <i class="fas fa-power-off me-3"></i> <span>تسجيل خروج</span>
            </a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="top-bar">
            <h5 class="mb-0 fw-bold text-dark">{% block header_title %}لوحة التحكم{% endblock %}</h5>
            <div class="user-badge"><i class="fas fa-user-circle me-1"></i> {{ current_user.username }}</div>
        </header>
        <div class="p-4">{% block content %}{% endblock %}</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleDropdown(id, btn) {
            const drop = document.getElementById(id);
            const arrow = btn.querySelector('.fa-chevron-left');
            const isShown = drop.style.display === "block";
            
            drop.style.display = isShown ? "none" : "block";
            arrow.classList.toggle("rotate", !isShown);
        }

        // إظهار اللودر عند التنقل
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if(this.href && !this.href.includes('#')) {
                    document.getElementById('loader').classList.remove('d-none');
                }
            });
        });
    </script>
</body>
</html>
