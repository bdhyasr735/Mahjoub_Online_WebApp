{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>إدارة الطلبات</h4>
        <button class="btn btn-primary" id="syncBtn" onclick="syncOrders()">
            <i class="fas fa-sync"></i> مزامنة الطلبات
        </button>
    </div>

    <table class="table">
        <thead>
            <tr>
                {% for col in columns %}<th>{{ col.label }}</th>{% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                {% for col in columns %}
                <td>
                    {% if col.key == 'status' %}
                        <select class="form-select" onchange="updateStatus(this, '{{ order.id }}')">
                            <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>قيد الانتظار</option>
                            <option value="paid" {% if order.status == 'paid' %}selected{% endif %}>مدفوع</option>
                        </select>
                    {% else %}
                        {{ order[col.key] }}
                    {% endif %}
                </td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
async function syncOrders() {
    const btn = document.getElementById('syncBtn');
    btn.disabled = true;
    btn.innerText = 'جاري المزامنة...';
    try {
        const response = await fetch("{{ url_for('orders.sync_orders') }}", { method: 'POST' });
        const result = await response.json();
        if (result.success) location.reload();
        else alert(result.message);
    } catch (e) { alert('خطأ في الاتصال'); }
    finally { btn.disabled = false; btn.innerText = 'مزامنة الطلبات'; }
}

async function updateStatus(select, orderId) {
    await fetch("{{ url_for('orders.update_order_status') }}", {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ orderId: orderId, value: select.value })
    });
}
</script>
{% endblock %}
