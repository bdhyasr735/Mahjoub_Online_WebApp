{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold">إدارة الطلبات (قمرة)</h4>
            <small class="text-muted">مزامنة الطلبات من منصة قمرة</small>
        </div>
        <button class="btn btn-primary shadow-sm" id="syncBtn" onclick="syncOrders()">
            <i class="fas fa-sync me-2"></i> مزامنة من قمرة
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="bg-light">
                    <tr>
                        {% for col in columns %}<th>{{ col.label }}</th>{% endfor %}
                        <th class="text-center">الإجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    {% for order in orders %}
                    <tr>
                        {% for col in columns %}
                            <td>{{ order[col.key] or '---' }}</td>
                        {% endfor %}
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-secondary">عرض</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function syncOrders() {
        const btn = document.getElementById('syncBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> جاري الجلب...';
        
        try {
            const response = await fetch("/orders/sync-orders", { method: 'POST' });
            const result = await response.json();
            if (result.success) {
                location.reload();
            } else {
                alert('خطأ: ' + result.message);
            }
        } catch (e) {
            alert('حدث خطأ أثناء الاتصال');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sync me-2"></i> مزامنة من قمرة';
        }
    }
</script>
{% endblock %}
