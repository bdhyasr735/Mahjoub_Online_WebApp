<!-- 📂 apps/orders/templates/admin/add_order.html -->

{% extends 'admin/admin_base.html' %}

{% block title %}إضافة طلب جديد{% endblock %}

{% block content %}
<div class="container py-4">
    <h3 class="fw-bold text-royal-purple mb-4">إضافة طلب سيادي جديد</h3>
    <div class="card shadow-sm border-royal p-4">
        <form action="{{ url_for('orders.add_new_order') }}" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">اسم العميل</label>
                    <input type="text" name="customer_name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="text" name="customer_phone" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">رقم المورد (Store ID)</label>
                    <!-- تم تغيير type إلى number لضمان إدخال أرقام فقط وتوافقها مع الـ Integer في الباك إند -->
                    <input type="number" name="supplier_id" class="form-control" placeholder="أدخل الرقم التعريفي للمتجر" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">المبلغ الإجمالي (SAR)</label>
                    <input type="number" step="0.01" name="total_price" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn text-white" style="background-color: var(--royal-purple);">حفظ الطلب وتسجيله</button>
        </form>
    </div>
</div>
{% endblock %}
